# ============================================================
# Butterfly 主题配置文件（中文注释版）
# 官方文档：
# - 中文：https://butterfly.js.org/
# - 英文：https://butterfly.js.org/en/
#
# 说明：
# 1. 这是 Butterfly 主题自己的配置文件，主要控制“页面长什么样、显示哪些模块、交互效果是什么”。
# 2. 这个文件和站点根目录下的 _config.yml 不同：
#    - 根目录 _config.yml：偏“网站基础设置”（标题、语言、永久链接、部署等）
#    - 主题 _config.yml：偏“视觉外观与功能模块”（导航栏、首页封面、侧边栏、评论、深色模式等）
# 3. 以 # 开头的都是注释，不会影响运行。
# 4. 建议你一次只改一个区域，改完就本地预览，这样最容易理解每个参数的效果。
# ============================================================

# ============================================================
# Navigation Settings / 导航栏设置
# 控制页面顶部导航条的 logo、标题、菜单、是否固定等。
# ============================================================
nav:
  # 导航栏 logo 图片地址。
  # 通常写主题或站点中的图片路径，例如：/img/logo.png
  # 留空时一般不显示图片。
  logo:

  # 是否在导航栏显示网站标题。
  # true 显示，false 不显示。
  display_title: true

  # 在文章页浏览时，是否在导航栏显示当前文章标题。
  # 适合文章较长时帮助读者确认正在看哪篇内容。
  display_post_title: true

  # 是否固定导航栏。
  # true：页面向下滚动时导航栏依然固定在顶部。
  # false：导航栏跟着页面正常滚动。
  fixed: false

menu:
  # 这里配置导航菜单。
  # 格式：
  # 菜单名: 路径 || 图标类名
  #
  # 如果有子菜单：
  # 父菜单||图标:
  #   子菜单名: 路径 || 图标
  #
  # 常用示例：
  # Home: / || fas fa-home
  # Archives: /archives/ || fas fa-archive
  # Tags: /tags/ || fas fa-tags
  # Categories: /categories/ || fas fa-folder-open
  # About: /about/ || fas fa-user
  #
  # 你以后完全可以做成适合个人网站的结构，例如：
  # 随笔、摄影、音乐、回忆、关于我。
  #
  # Home: / || fas fa-home
  # List||fas fa-list:
  #   Music: /music/ || fas fa-music
  #   Movie: /movies/ || fas fa-video

# ============================================================
# Code Blocks Settings / 代码块样式设置
# 如果你的网站会发代码、技术笔记，这一部分会影响代码展示效果。
# 即使你主要写随笔，也可以先了解一下。
# ============================================================
code_blocks:
  # 代码块主题风格。
  # 可选：darker / pale night / light / ocean / false
  # false 表示不启用主题预设样式。
  theme: light

  # 是否使用类似 macOS 窗口风格的代码块头部。
  # true 会显示红黄绿三个圆点风格。
  macStyle: false

  # 代码块最大高度限制，单位 px。
  # 例如 300 表示超出高度后会出现滚动。
  # false 表示不限制高度。
  height_limit: false

  # 是否自动换行。
  # true：长代码会换行。
  # false：长代码横向滚动。
  word_wrap: false

  # 工具栏设置。
  # 是否显示复制按钮。
  copy: true

  # 是否显示代码语言标签，如 JS、HTML、YAML。
  language: true

  # 代码块折叠按钮行为：
  # true  = 默认折叠，用户可展开
  # false = 默认展开，用户可折叠
  # none  = 默认展开，且隐藏折叠按钮
  shrink: false

  # 是否支持代码块全屏查看。
  fullpage: false

# ============================================================
# Social media links / 社交链接
# 用于展示 Github、邮箱、微博等社交入口。
# 常见位置可能在主页、侧边栏、页脚等，取决于主题布局。
# ============================================================
social:
  # 格式：
  # 图标类名: 链接 || 描述文字 || 颜色
  # 例如：
  # fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # fas fa-envelope: mailto:xxxxxx@gmail.com || Email || '#4a7dbe'
  # fab fa-weibo: https://weibo.com/xxxxx || 微博 || '#e6162d'
  # fas fa-music: https://music.163.com/... || 网易云 || '#c20c0c'
  #
  # 这部分很适合你的个人网站，可以以后挂上：GitHub、邮箱、摄影主页、音乐平台、社交主页等。
  # fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # fas fa-envelope: mailto:xxxxxx@gmail.com || Email || '#4a7dbe'

# ============================================================
# Image Settings / 图片相关设置
# 控制 favicon、头像、首页封面、分类页横幅、背景图、404 图等。
# 这一部分对网站气质影响非常大。
# ============================================================

# 浏览器标签页上的小图标（favicon）。
# 一般建议换成自己的站点图标。
favicon: /img/favicon.png

avatar:
  # 头像图片地址。
  # 常显示在侧边栏作者卡片、首页介绍区等位置。
  img: /img/头像.jpg

  # 头像是否启用动态效果。
  effect: false

# 是否禁用所有页面顶部横幅图（top image / banner）。
# true：全站都不显示顶部大图。
# false：允许各页面显示顶部图。
disable_top_img: false

# 默认顶部横幅图。
# 如果某个页面没有单独设置 banner，就会使用这里的默认图。
default_top_img: /img/首页顶部.jpg

# 首页顶部横幅图。
index_img:

# 归档页顶部横幅图。
archive_img:

# 标签页顶部横幅图。
# 注意是 tag page，不是 tags 列表文字本身的概念差异说明。
tag_img:

# 为不同标签单独设置横幅图。
# 格式示例：
# tag_per_img:
#   摄影: /img/tag-photo.jpg
#   音乐: /img/tag-music.jpg
tag_per_img:

# 分类页顶部横幅图。
category_img:

# 为不同分类单独设置横幅图。
# 格式示例：
# category_per_img:
#   随笔: /img/cat-essay.jpg
#   回忆: /img/cat-memory.jpg
category_per_img:

# 页脚背景图。
# false 表示不设置。
footer_img: /img/页脚.png

# 整站背景。
# 可以填：
# - 颜色值，如 '#f5f5f5'
# - 图片 URL
# - 一个数组（每次加载随机选一个）
# 示例：
# background: '#fafafa'
# background: /img/bg.jpg
# background:
#   - /img/bg1.jpg
#   - /img/bg2.jpg
background : /img/主背景.jpg

cover:
  # 是否启用首页封面图逻辑。
  index_enable: true

  # 是否启用侧边栏封面图逻辑。
  aside_enable: true

  # 是否启用归档等列表页封面图逻辑。
  archives_enable: true

  # 默认封面图列表。
  # 当文章没有单独设置封面时，会从这里取默认封面。
  # 可以放多张图，主题会随机或按策略选择。
  default_cover:
    # - xxx.jpg

error_img:
  # 友情链接等区域的图片加载失败时，显示的替代图。
  flink: /img/friend_404.gif

  # 文章页图片加载失败时，显示的替代图。
  post_page: /img/404.jpg

error_404:
  # 是否启用简易 404 页面。
  enable: false

  # 404 页面副标题文字。
  subtitle: 'Page Not Found'

  # 404 页背景图。
  background: /img/error-page.png

# ============================================================
# Post Meta / 文章元信息设置
# 控制日期、分类、标签等在首页卡片和文章页上的显示方式。
# ============================================================
post_meta:
  page:
    # 首页/列表页文章卡片显示哪个日期：
    # created = 创建时间
    # updated = 更新时间
    # both    = 两者都显示
    date_type: created

    # 日期展示方式：
    # date     = 具体日期
    # relative = 相对时间（如 3 days ago）
    date_format: date

    # 是否显示分类。
    categories: true

    # 是否显示标签。
    tags: false

    # 是否显示标签前的小文字标识/图标标签。
    label: true

  post:
    # 文章页元信息位置：left / center
    position: left

    # 文章页显示创建时间、更新时间或两者。
    date_type: both

    # 日期展示方式：date / relative
    date_format: date

    # 是否显示分类。
    categories: true

    # 是否显示标签。
    tags: true

    # 是否显示元信息标签文字。
    label: true

# ============================================================
# Index page settings / 首页设置
# 主要控制首页封面区、副标题、文章卡片布局、摘要展示方式。
# ============================================================

# 首页站点信息在顶部图中的垂直位置。
# 例如可写 300px、20%、15rem。
# 留空表示使用主题默认值。
index_site_info_top:

# 首页顶部图高度。
# 例如 300px / 50vh / 30rem。
# 留空表示使用主题默认值。
index_top_img_height:

subtitle:
  # 是否启用首页副标题。
  # 这是主题首页那句动态/静态介绍语，不是根目录 _config.yml 里的站点 subtitle。
  enable: false

  # 是否启用打字机效果。
  effect: true

  # typed.js 的高级自定义配置。
  # 如果你不了解 typed.js，先留空即可。
  typed_option:

  # 副标题来源。
  # false = 不调用第三方接口
  # 1 = hitokoto.cn
  # 2 = aa1 一言接口
  # 3 = 今日诗词
  # 如果你想完全自己写文案，建议保持 false。
  source: false

  # 自定义副标题文本。
  # 可写多行列表，例如：
  # sub:
  #   - 记录我的随笔、摄影与音乐
  #   - 把生活里微小但珍贵的部分保存下来
  #   - 写给此刻，也写给未来
  # 如果关闭打字机效果，通常只显示第一行。
  sub:

# 首页文章卡片布局方式。
# 1 左图右文
# 2 右图左文
# 3 左右交错
# 4 上图下文
# 5 信息覆盖在图上
# 6 瀑布流（上图下文）
# 7 瀑布流（文字覆盖图）
index_layout: 3

index_post_content:
  # 首页文章摘要显示方式：
  # 1 = 只显示 description
  # 2 = 优先 description，没有则显示自动摘要
  # 3 = 自动摘要（默认）
  # false = 不显示摘要
  method: 3

  # 摘要长度。
  # 只有 method 为 2 或 3 时有效。
  # 数字越大，首页显示的文章预览越长。
  length: 500

# ============================================================
# Post Settings / 文章页设置
# 包括目录、版权声明、打赏、相关文章、上一篇下一篇等。
# ============================================================
toc:
  # 文章页是否显示目录。
  post: true

  # 独立页面是否显示目录。
  page: false

  # 是否显示目录编号。
  number: true

  # 目录是否默认展开。
  expand: false

  # 是否启用简洁风格目录（仅对 post 生效）。
  style_simple: false

  # 是否显示阅读进度百分比。
  scroll_percent: true

post_copyright:
  # 是否在文章底部显示版权声明。
  enable: true

  # 是否对版权文字做解码/防复制处理。
  # 一般保持 false 即可。
  decode: false

  # 作者链接。
  # 可以填你的个人主页、关于页、社交主页等。
  author_href:

  # 文章版权协议名称。
  license: CC BY-NC-SA 4.0

  # 对应版权协议链接。
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  # 是否启用赞赏/打赏。
  enable: false

  # 打赏区域说明文字。
  text:

  QR_code:
    # 可配置多个收款码。
    # 示例：
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

post_edit:
  # 是否显示“在线编辑本文”入口。
  # 适合把博客源码放在 GitHub 仓库中的情况。
  enable: false

  # 在线编辑地址前缀。
  # 例如 GitHub 仓库 edit 页面路径。
  url:

related_post:
  # 是否显示相关文章。
  enable: true

  # 显示相关文章数量。
  limit: 6

  # 按创建时间还是更新时间计算相关项的日期信息。
  date_type: created

# 文章页翻页逻辑。
# 1 = “下一篇”链接到更旧的文章
# 2 = “下一篇”链接到更新的文章
# false = 不显示翻页
post_pagination: 1

noticeOutdate:
  # 是否对久未更新的文章显示“内容可能过期”提示。
  enable: false

  # 提示样式：simple / flat
  style: flat

  # 超过多少天未更新时显示提示。
  limit_day: 365

  # 提示位置：top / bottom
  position: top

  # 提示前半段文字。
  message_prev: It has been

  # 提示后半段文字。
  message_next: days since the last update, the content of the article may be outdated.

# ============================================================
# Footer Settings / 页脚设置
# 控制页脚导航、建站年份、版权信息、自定义文字等。
# ============================================================
footer:
  # 页脚导航内容。
  # 可写自定义 HTML 或文本（具体看主题支持方式）。
  nav:

  owner:
    # 是否显示站点所有者信息。
    enable: true

    # 建站起始年份。
    # 常用于显示“© 2025 - 2026”之类的年份范围。
    since: 2025

  copyright:
    # 是否显示主题和框架版权。
    enable: false

    # 是否显示版本号。
    version: true

  # 页脚自定义文字。
  # 很适合放一句你自己的签名句子。
  custom_text: 哦牛批这里也看

# ============================================================
# Aside Settings / 侧边栏设置
# 包括作者卡片、公告、最新文章、分类、标签、归档、站点信息等。
# ============================================================
aside:
  # 是否启用侧边栏。
  enable: true

  # 是否默认隐藏侧边栏。
  hide: false

  # 是否显示“隐藏侧边栏”的按钮。
  button: true

  # 手机端是否显示侧边栏。
  mobile: true

  # 侧边栏位置：left / right
  position: right

  display:
    # 以下是侧边栏中几个列表模块是否显示。
    archive: true
    tag: true
    category: true

  card_author:
    # 作者卡片是否启用。
    enable: true

    # 作者简介。
    # 很适合写一句个人介绍，例如“写随笔，也拍照，偶尔记录音乐和生活。”
    description:

    button:
      # 是否启用作者卡片按钮。
      enable: false

      # 按钮图标。
      icon: fab fa-github

      # 按钮文字。
      text: Follow Me

      # 按钮链接。
      link: https://github.com/xxxxxx

  card_announcement:
    # 公告卡片。
    enable: true

    # 公告内容。
    # 适合放欢迎语、更新说明、站点定位等。
    content: 我是你大坝

  card_recent_post:
    # 最近文章卡片。
    enable: true

    # 显示数量。0 表示显示全部。
    limit: 5

    # 排序方式：date / updated
    sort: date

    # 额外排序配置，通常留空。
    sort_order:

  card_newest_comments:
    # 最新评论卡片。
    enable: false

    # 排序配置。
    sort_order:

    # 显示条数。
    limit: 6

    # 缓存时间，单位分钟，数据保存到 localStorage。
    storage: 10

    # 是否显示评论者头像。
    avatar: true

  card_categories:
    # 分类卡片。
    enable: true

    # 显示数量，0 为全部。
    limit: 8

    # 是否展开分类层级：none / true / false
    expand: none

    # 排序配置。
    sort_order:

  card_tags:
    # 标签卡片。
    enable: true

    # 显示标签数量，0 为全部。
    limit: 40

    # 是否启用彩色标签。
    color: false

    # 自定义标签颜色。
    custom_colors:

    # 标签排序方式：random / name / length
    orderby: random

    # 排序方向：1 或 asc 升序；-1 或 desc 降序
    order: 1

    # 额外排序配置。
    sort_order:

  card_archives:
    # 归档卡片。
    enable: true

    # 归档类型：monthly / yearly
    type: monthly

    # 日期格式。
    # 如 YYYY年MM月、MMMM YYYY 等。
    format: MMMM YYYY

    # 排序方向：1 升序，-1 降序
    order: -1

    # 显示数量，0 为全部。
    limit: 8

    # 额外排序配置。
    sort_order:

  card_post_series:
    # 文章系列卡片。
    enable: true

    # 标题是否直接显示系列名。
    series_title: false

    # 排序依据：title 或 date
    orderBy: 'date'

    # 排序方向：1 / -1
    order: -1

  card_webinfo:
    # 站点信息卡片。
    enable: true

    # 是否显示文章总数。
    post_count: true

    # 是否显示最近更新时间。
    last_push_date: true

    # 排序配置。
    sort_order:

    # 网站运行起始时间。
    # 格式建议：Month/Day/Year Time 或 Year/Month/Day Time
    # 例如：2026/04/01 00:00:00
    # 配置后可显示站点运行时长。
    runtime_date:

# ============================================================
# Bottom right button / 右下角按钮设置
# 包括回到顶部、阅读模式、深色模式、繁简切换等按钮相关功能。
# ============================================================

# 右下角按钮距离底部的距离。
# 默认单位 px，例如：20px 或 30。
rightside_bottom:

translate:
  # 是否启用繁简转换。
  enable: false

  # 切换按钮默认文字。
  default: 繁

  # 站点默认编码：1 = 繁体；2 = 简体
  defaultEncoding: 2

  # 切换延迟时间。
  translateDelay: 0

  # 当前为简体时，按钮显示的“切换到繁体”的字样。
  msgToTraditionalChinese: '繁'

  # 当前为繁体时，按钮显示的“切换到简体”的字样。
  msgToSimplifiedChinese: '簡'

# 是否启用阅读模式按钮。
# 阅读模式一般会弱化干扰元素，提升阅读专注感。
readmode: true

darkmode:
  # 是否启用深色模式。
  enable: true

  # 是否显示深浅模式切换按钮。
  button: true

  # 是否自动切换深浅模式。
  # 1 = 跟随系统；若系统不支持，则按晚 6 点到早 6 点切换
  # 2 = 固定按晚 6 点到早 6 点自动切换
  # false = 不自动切换
  autoChangeMode: false

  # 自定义浅色模式开始时间。
  # 若不填，通常使用默认时间。
  start:

  # 自定义浅色模式结束时间。
  end:

# 是否在回到顶部按钮中显示滚动百分比。
rightside_scroll_percent: false

rightside_item_order:
  # 是否启用右下角按钮排序自定义。
  enable: false

  # 隐藏的按钮。
  # 可选值见上方注释：readmode, translate, darkmode, hideAside, toc, chat, comment
  hide:

  # 显示的按钮顺序。
  show:

# 右下角配置按钮是否有动画效果。
rightside_config_animation: true

# ============================================================
# Global Settings / 全局设置
# 一些全站生效的交互和内容增强功能。
# ============================================================
anchor:
  # 滚动页面时，URL 是否根据标题锚点自动更新。
  auto_update: false

  # 点击标题时是否滚动并更新锚点。
  click_to_scroll: false

# 是否为文章图片说明 figcaption 做优化显示。
photofigcaption: false

copy:
  # 是否启用复制功能增强。
  enable: true

  copyright:
    # 复制内容后是否自动附加版权信息。
    enable: false

    # 当复制字符数大于该值时才追加版权信息。
    limit_count: 150

wordcount:
  # 是否启用字数统计。
  # 需要先安装 hexo-wordcount 插件。
  enable: false

  # 是否在文章元信息中显示字数。
  post_wordcount: true

  # 是否显示预计阅读时长。
  min2read: true

  # 是否在侧边栏站点信息中显示全站总字数。
  total_wordcount: true

busuanzi:
  # 不蒜子统计：访客数 UV、访问量 PV 等。
  # 对中文博客比较常见。
  site_uv: false
  site_pv: false
  page_pv: true

# ============================================================
# Math / 数学公式设置
# 用于渲染 MathJax 或 KaTeX 公式。
# 如果你的网站不写公式，直接留空或关闭即可。
# ============================================================
math:
  # 选择公式引擎：mathjax / katex
  # 留空表示不启用。
  use:

  # true = 每个页面都加载公式脚本
  # false = 只有在页面 front-matter 中显式开启时才加载
  per_page: true

  # 是否隐藏横向滚动条。
  hide_scrollbar: false

  mathjax:
    # 是否启用 MathJax 右键菜单。
    enableMenu: true

    # 公式编号方式：all / ams / none
    tags: none

  katex:
    # 是否允许复制 KaTeX 原始公式文本。
    copy_tex: false

# ============================================================
# Search / 搜索设置
# 支持 Algolia、本地搜索、DocSearch。
# 个人博客常用的是 local_search。
# ============================================================
search:
  # 选择搜索方式：algolia_search / local_search / docsearch
  # 留空表示不启用搜索。
  use:

  # 搜索框占位文字。
  placeholder:

  algolia_search:
    # 每页显示的搜索结果数量。
    hitsPerPage: 6

  local_search:
    # 页面加载时是否预先载入搜索数据。
    # true 首次搜索更快，但初次加载可能稍重。
    preload: false

    # 每篇文章最多显示多少条命中结果。
    # -1 表示显示全部。
    top_n_per_article: 1

    # 是否把 HTML 转义字符还原为可读文本。
    unescape: false

    pagination:
      # 是否给搜索结果分页。
      enable: false

      # 每页结果数。
      hitsPerPage: 8

    # 本地搜索脚本的 CDN 设置。
    CDN:

  docsearch:
    # Algolia DocSearch 相关配置。
    appId:
    apiKey:
    indexName:
    option:

# ============================================================
# Share System / 分享功能
# 让读者把文章分享到社交平台。
# ============================================================
share:
  # 选择分享方式：sharejs / addtoany
  # 留空表示不启用分享。
  use: sharejs

  sharejs:
    # 启用的分享站点，逗号分隔。
    sites: facebook,x,wechat,weibo,qq

  addtoany:
    # AddToAny 平台的分享项。
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# ============================================================
# Comments System / 评论系统
# 支持多种第三方评论服务。最多可配置两个，前者默认显示。
# 如果你只想静态展示内容，也可以完全不启用评论。
# ============================================================
comments:
  # 留空表示不启用评论。
