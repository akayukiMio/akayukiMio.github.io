  # true 会等评论区域进入视口再加载，但评论计数可能失效。
  lazyload: false

  # 是否在文章顶部图区域显示评论数。
  count: false

  # 是否在首页文章卡片显示评论数。
  card_post_count: false

disqus:
  # Disqus shortname。
  shortname:

  # 用于最新评论组件的 API key。
  apikey:

disqusjs:
  # DisqusJS 配置。
  shortname:
  apikey:
  option:

livere:
  # Livere uid。
  uid:

gitalk:
  # Gitalk 需要 GitHub OAuth 与仓库配置。
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

valine:
  # Valine 配置。
  appId:
  appKey:
  avatar: monsterid
  serverURLs:
  bg:
  # 是否把 Valine 访客统计当作页面阅读数。
  visitor: false
  option:

waline:
  # Waline 服务端地址。
  serverURL:
  bg:
  # 是否把 Waline pageview 当作阅读数。
  pageview: false
  option:

utterances:
  # utterances 绑定的 GitHub 仓库。
  repo:

  # issue 映射方式：pathname / url / title / og:title
  issue_term: pathname

  # 浅色主题。
  light_theme: github-light

  # 深色主题。
  dark_theme: photon-dark

  # 自定义脚本地址。
  js:

  # 额外配置。
  option:

facebook_comments:
  app_id:
  user_id:
  pageSize: 10
  # 排序方式：social / time / reverse_time
  order_by: social
  lang: en_US

twikoo:
  envId:
  region:
  # 是否使用 Twikoo 访客统计作为阅读数。
  visitor: false
  option:

giscus:
  # Giscus 需要 GitHub Discussions 配置。
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

remark42:
  host:
  siteId:
  option:

artalk:
  server:
  site:
  # 是否把 Artalk 访客统计当作阅读数。
  visitor: false
  option:

# ============================================================
# Chat Services / 在线聊天服务
# 适合商业网站或需要即时联系的站点。个人博客通常可以不启用。
# ============================================================
chat:
  # 选择聊天服务：chatra / tidio / crisp
  # 留空表示不启用。
  use:

  # 是否把聊天入口放到右下角按钮区。
  rightside_button: false

  # 原始聊天按钮是否在上滑时显示、下滑时隐藏。
  button_hide_show: false

chatra:
  id:

tidio:
  public_key:

crisp:
  website_id:

# ============================================================
# Analysis / 统计分析
# 站点访问统计、用户行为分析等。
# 如果你只是先搭建个人网站，可以稍后再接入。
# ============================================================

# 百度统计 ID。
baidu_analytics:

# Google Analytics ID。
google_analytics:

# Cloudflare Web Analytics。
cloudflare_analytics:

# Microsoft Clarity。
microsoft_clarity:

umami_analytics:
  # 是否启用 Umami。
  enable: false

  # 自建 Umami 服务地址。
  serverURL:

  # Umami 脚本名称。
  script_name: script.js

  # 站点 ID。
  website_id:

  # 额外参数。
  option:

  UV_PV:
    # 是否用 Umami 提供站点 UV / PV / 页面 PV。
    site_uv: false
    site_pv: false
    page_pv: false

    # Umami Cloud 用 API key；自建 Umami 用 token。
    token:

google_tag_manager:
  # GTM 标签 ID。
  tag_id:

  # 可选，自定义域名。
  domain:

# ============================================================
# Advertisement / 广告设置
# 如果你的网站是纯个人表达空间，通常可以长期关闭。
# ============================================================
google_adsense:
  # 是否启用 Google Adsense。
  enable: false

  # 是否开启自动广告。
  auto_ads: true

  # Adsense 脚本地址。
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js

  # client ID。
  client:

  # 是否启用页面级广告。
  enable_page_level_ads: true

ad:
  # 手动插入广告位。
  # 首页每三篇文章之间插入广告。
  index:

  # 侧边栏广告。
  aside:

  # 文章页底部分页前广告。
  post:

# ============================================================
# Verification / 站点验证
# 用于搜索引擎站长平台验证所有权。
# ============================================================
site_verification:
  # 格式示例：
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# ============================================================
# Beautify / Effect / 美化与效果
# 控制圆角、遮罩、加载动画、页面切换、字体、鼠标特效等。
# ============================================================

# 自定义主题色。
# 注意：颜色值必须用双引号，例如 "#49B1F5"。
# 如果你以后想做“柔和”“胶片感”“夜色”风格，可以从这里进一步改色。
#
# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类页界面风格。
# 可选：index（与首页一致）/ default（与归档页一致）
# 留空通常等同默认。
category_ui:

# 标签页界面风格。
tag_ui:

# 是否启用圆角 UI。
rounded_corners_ui: true

# 是否两端对齐文本。
text_align_justify: false

mask:
  # 是否给头图加遮罩。
  header: true

  # 是否给页脚加遮罩。
  footer: true

preloader:
  # 是否启用加载动画。
  enable: false

  # 加载动画来源：
  # 1 = fullpage-loading
  # 2 = pace 进度条
  source: 1

  # pace 的 CSS 地址。
  pace_css_url:

# 是否启用页面切换过渡动画。
enter_transitions: true

# 默认显示模式：light / dark
# 表示首次进入时默认的主题模式倾向。
display_mode: light

beautify:
  # 是否启用文章内容美化。
  enable: false

  # 作用范围：site / post
  field: post

  # 标题前图标 unicode，如 '\f0c1'
  title_prefix_icon:

  # 标题前图标颜色。
  title_prefix_icon_color:

font:
  # 以下属于高级字体设置。
  # 如果你不熟悉字体加载和兼容问题，建议先不要改。
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  # 网站标题字体外链。
  font_link:

  # 网站标题字体族名称。
  font_family:

hr_icon:
  # 是否启用分割线图标。
  enable: true

  # Font Awesome 图标 unicode 值。
  icon:

  # 图标纵向偏移。
  icon_top:

activate_power_mode:
  # 打字爆炸特效，通常更偏娱乐效果。
  enable: false
  colorful: true
  shake: true
  mobile: false

# ============================================================
# Background effects / 背景与鼠标特效
# 这些效果能增强个性，但也可能让页面显得过花或影响性能。
# 建议谨慎开启。
# ============================================================
canvas_ribbon:
  enable: false
  # 彩带大小。
  size: 150
  # 透明度 0~1。
  alpha: 0.6
  zIndex: -1
  # 点击是否切换效果。
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  # 飘动彩带效果。
  enable: false
  mobile: false

canvas_nest:
  enable: false
  # 线条颜色，RGB 格式字符串，用逗号分隔。
  color: '0,0,255'
  # 透明度。
  opacity: 0.7
  zIndex: -1
  # 连线数量。
  count: 99
  mobile: false

fireworks:
  # 点击烟花效果。
  enable: false
  zIndex: 9999
  mobile: false

click_heart:
  # 点击爱心效果。
  enable: false
  mobile: false

clickShowText:
  # 点击显示文字效果。
  enable: false
  text:
    # 可写多个词句，点击时随机或顺序飘出。
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  # 是否随机显示文字。
  random: false
  mobile: false

# ============================================================
# Lightbox Settings / 图片灯箱
# 控制图片点击后是否放大查看。
# ============================================================
lightbox:
  # 可选：fancybox / medium_zoom
  # 留空表示不启用。

# ============================================================
# Tag Plugins settings / 标签插件相关
# 包括系列文章、ABC 音乐记谱、Mermaid 图表、Chart.js 等。
# ============================================================
series:
  # 是否启用系列文章功能。
  enable: false

  # 排序依据：title / date
  orderBy: 'title'

  # 排序方向：1 / -1
  order: 1

  # 是否显示系列编号。
  number: true

abcjs:
  # ABC 音乐记谱插件。
  # 如果你以后想展示乐谱，这个功能会很有用。
  enable: false
  per_page: true

mermaid:
  # Mermaid 流程图/结构图。
  enable: false

  # 是否允许直接用代码块书写 Mermaid。
  code_write: false

  theme:
    # Mermaid 在浅色和深色模式下的主题。
    light: default
    dark: dark

  # 是否显示“新窗口打开”按钮。
  open_in_new_tab: true

  # 是否支持缩放拖拽。
  zoom_pan: true

chartjs:
  # Chart.js 图表支持。
  enable: false

  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'

  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'

  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

note:
  # 提示框样式：simple / modern / flat / disabled
  style: flat

  # 是否显示提示框图标。
  icons: true

  # 圆角半径。
  border_radius: 3

  # 背景亮度偏移量。
  light_bg_offset: 0

# ============================================================
# Other Settings / 其他设置
# ============================================================
pjax:
  # 是否启用 pjax（局部刷新加速切页）。
  enable: false

  exclude:
    # 不走 pjax 的页面路径，例如：
    # - /music/

aplayerInject:
  # 是否自动注入 APlayer/Meting 资源。
  enable: false
  per_page: true

snackbar:
  # 是否启用 Toast 提示。
  enable: false

  # 位置：top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
  position: bottom-left

  # 浅色模式背景色。
  bg_light: '#49b1f5'

  # 深色模式背景色。
  bg_dark: '#1f1f1f'

# 是否启用 instant.page 预加载。
instantpage: false

lazyload:
  # 是否启用图片懒加载。
  enable: false

  # 是否优先使用浏览器原生 lazyload。
  native: false

  # 应用范围：site / post
  field: site

  # 占位图。
  placeholder:

  # 是否启用模糊占位效果。
  blur: false

pwa:
  # 是否启用 PWA。
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  # 是否启用 Open Graph 元数据。
  # 有助于社交平台分享时生成更好的预览卡片。
  enable: true

  option:
    # 可选社交元数据项。
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

structured_data:
  # 是否启用结构化数据。
  enable: false

  # 网站备用名称数组。
  # 例如：['夜航船', 'Mio Blog']
  alternate_name:

# 是否自动添加 CSS 前缀以增强兼容性。
css_prefix: true

inject:
  # 自定义插入 head 和 body 底部的代码。
  # 常用于额外 CSS/JS、验证脚本、播放器脚本等。
  head:
    # - <link rel="stylesheet" href="/xxx.css">
  bottom:
    # - <script src="xxxx"></script>

# ============================================================
# CDN Settings / CDN 设置
# 控制主题内部资源和第三方资源从哪里加载。
