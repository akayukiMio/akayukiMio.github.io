# ============================================================
# Hexo 全局配置文件
# 官方文档：https://hexo.io/docs/configuration.html
# 说明：
# 1. 这是你的网站“总配置”，会影响站点名称、语言、链接结构、主题、分页、部署等。
# 2. 以 # 开头的内容都是注释，只是写给你看的说明，不会影响网站运行。
# 3. 建议你每次只改一小部分，改完后本地预览，确认效果后再继续。
# 4. 这个文件主要负责“网站级别”的设置；如果你以后要细调主题外观，还常常需要去主题自己的配置文件里改。
# ============================================================

# ============================================================
# Site / 网站基础信息
# 这一部分决定网站最核心的身份信息，通常是你最先会修改的内容。
# ============================================================

# 网站主标题。
# 会显示在浏览器标题、页面顶部、搜索结果标题等位置。
# 例子：
# title: 夜航船
# title: Mio's Notebook
# title: 夏天以前
# 如果你想把这里做成“个人精神角落”的感觉，标题可以简短、有记忆点。
title: sekai no owari

# 网站副标题。
# 常用于补充说明网站气质或主题，有些主题会显示，有些主题可能不显示。
# 适合写一句短句，例如：
# subtitle: '记录随想、摄影与生活片段'
# subtitle: '给未来的自己留一盏灯'
subtitle: '澪的笔记本'

# 网站描述。
# 主要用于 SEO（搜索引擎摘要）以及页面 meta 信息。
# 可以理解为“这个网站大致是干什么的”。
# 建议写成一两句话，概括你的内容方向。
# 例如：
# description: '这里收录我的随笔、摄影、音乐推荐、回忆与灵感。'
description: '到处丢一些东西！'

# 网站关键词。
# 主要给搜索引擎和部分主题使用。
# 如果不确定可以先留空，等网站内容慢慢稳定后再补。
# 推荐写成列表形式，例如：
# keywords:
#   - 随笔
#   - 摄影
#   - 音乐推荐
#   - 日记
#   - 灵感记录
keywords:

# 作者名称。
# 常显示在文章作者、页脚、RSS、主题信息等位置。
# 可以写真名、昵称、笔名。
author: akayukimio

# 网站语言。
# 影响 Hexo 自带文案、日期语言、部分主题显示文本等。
# 常见值：
# - en      英文
# - zh-CN   简体中文
# - zh-TW   繁體中文
# 如果你的网站主要面向中文内容，通常建议改成 zh-CN。
language: zh-CN

# 网站时区。
# 影响文章时间、归档时间等显示和解析方式。
# 常见写法例如：
# timezone: 'Asia/Shanghai'
# timezone: 'Asia/Tokyo'
# 如果留空，通常会使用系统默认时区。
timezone: 'Asia/Shanghai'

# ============================================================
# URL / 网站地址与永久链接
# 这一部分决定网页最终的网址形式。
# ============================================================

# 网站的正式地址。
# 本地开发阶段可以先保留默认值，等你部署到线上后一定要改成真实网址。
# 例如：
# url: https://yourname.github.io
# url: https://example.com
# 如果这里写错，站内绝对链接、RSS、sitemap、分享链接等都可能不正确。
url: https://akayukiMio.github.io

# 文章永久链接格式。
# 决定文章 URL 长什么样。
# 当前格式：年/月/日/标题/
# 例如文章标题为 hello，日期是 2026-04-01，可能生成：
# /2026/04/01/hello/
# 常见变量：
# :year  年
# :month 月
# :day   日
# :title 文章文件标题
# 如果你想要更简洁的网址，也可以以后改成：
# permalink: posts/:title/
# permalink: :title/
permalink: :year/:month/:day/:title/

# 永久链接默认参数。
# 一般在你使用自定义 permalink 占位符时才会用到。
# 当前留空即可，大多数个人网站不会改这里。
permalink_defaults:

# pretty_urls 用来控制生成 URL 时是否保留 index.html / .html 这些尾缀。
pretty_urls:
  # 是否保留结尾的 index.html。
  # true  表示类似 /about/index.html
  # false 表示类似 /about/
  # 如果你更喜欢简洁网址，通常可以改成 false。
  trailing_index: true

  # 是否保留 .html 后缀。
  # true  表示 /about.html
  # false 表示 /about/
  # 这个设置会影响最终链接观感，也和你的部署环境有关。
  trailing_html: true

# ============================================================
# Directory / 目录结构设置
# 这一部分告诉 Hexo：不同类型的文件放在哪里、生成到哪里。
# 一般不建议乱改，除非你已经明确知道自己在调整项目结构。
# ============================================================

# 站点内容源目录。
# 你写的文章、页面、图片等原始内容，通常都放在 source/ 里。
source_dir: source

# 生成后的静态网站输出目录。
# 执行 hexo generate 后，最终网页文件会输出到这里。
# 部署时常常就是上传这个目录里的内容。
public_dir: public

# 标签页路由目录。
# 生成标签页后，对应访问路径通常会是 /tags/
tag_dir: tags

# 归档页路由目录。
# 生成归档页后，对应访问路径通常会是 /archives/
archive_dir: archives

# 分类页路由目录。
# 生成分类页后，对应访问路径通常会是 /categories/
category_dir: categories

# 代码下载目录。
# 一些代码块资源或下载内容可能会用到，通常保持默认即可。
code_dir: downloads/code

# 国际化目录。
# 当你使用多语言站点时，Hexo 会从这里读取语言文件。
# :lang 表示按语言代码组织。
i18n_dir: :lang

# 跳过渲染的文件/路径。
# 写在这里的文件会被直接复制，不经过 Hexo 渲染引擎处理。
# 常用于：
# - 某些原始 HTML 文件
# - 需要原样保留的脚本
# - 第三方验证文件
# 可写成列表，例如：
# skip_render:
#   - 'admin/**'
#   - 'raw/**/*'
skip_render:

# ============================================================
# Writing / 写作与文章生成行为
# 这一部分决定你新建文章、链接处理、草稿渲染、代码高亮等行为。
# ============================================================

# 新文章文件名格式。
# :title 会用你创建文章时输入的标题替换。
# 例如你执行 hexo new "春天"，可能生成 source/_posts/春天.md
new_post_name: :title.md

# 默认布局。
# 新建文章时默认使用哪种布局模板。
# 常见值：
# - post  普通文章
# - page  独立页面
# 一般博客文章保持 post 即可。
default_layout: post

# 是否自动把标题转成 Title Case（英文首字母大写风格）。
# 中文站点通常保持 false。
titlecase: false

# 外部链接行为设置。
external_link:
  # 是否启用外链处理。
  # true 时，Hexo 会按下面规则处理外部链接。
  enable: true

  # 处理范围。
  # site 表示整个站点内的外链都按规则处理。
  # post 表示只处理文章正文里的外链。
  field: site

  # 排除的域名。
  # 如果有些外部链接你不想被当成“外链处理”，可以填在这里。
  # 例如：
  # exclude: 'example.com,cdn.example.com'
  exclude: ''

# 文件名大小写控制。
# 0 = 不修改
# 1 = 全部转成小写
# 2 = 全部转成大写
# 中文文件名通常影响不大，英文 slug 场景下常保持 0 或改为 1。
filename_case: 0

# 是否渲染草稿。
# false：草稿不会出现在生成的网站里
# true：草稿也会一起生成，适合本地预览未完成内容
# 如果你想把“日记草稿”只留在本地，就保持 false。
render_drafts: false

# 是否启用文章资源文件夹。
# false：文章图片等资源你需要自己组织
# true：每篇文章可拥有同名资源目录，方便管理图片/附件
# 如果你以后常写图文内容，这个选项很值得考虑开启。
post_asset_folder: false

# 是否启用相对链接。
# 一般建议保持 false，使用绝对路径更稳定。
# 除非你非常清楚自己的部署和链接结构，否则不要轻易改。
relative_link: false

# 是否渲染未来日期的文章。
# true：即使文章日期写在未来，也照样生成
# false：未来文章不生成
# 如果你会提前写“定时发布”的内容，这个选项就很重要。
future: true

# 代码高亮引擎。
# 可选 highlight.js 或 prismjs（但通常主要启用其中一种体系）。
# 这里当前使用的是 highlight.js。
syntax_highlighter: highlight.js

# highlight.js 相关设置。
highlight:
  # 是否显示代码行号。
  line_number: true

  # 是否自动检测代码语言。
  # 一般建议 false，避免识别错误。
  auto_detect: false

  # 用什么替换 tab，留空表示不替换。
  tab_replace: ''

  # 是否为代码块添加外层包装，通常保持 true。
  wrap: true

  # 是否直接使用 highlight.js 的原生样式类。
  hljs: false

# prismjs 相关设置。
# 即使当前 syntax_highlighter 不是 prismjs，这部分配置仍然可以先保留。
prismjs:
  # 是否在渲染前预处理代码块。
  preprocess: true

  # 是否显示行号。
  line_number: true

  # tab 替换字符，留空表示不替换。
  tab_replace: ''

# ============================================================
# Home page setting / 首页文章列表设置
# 控制首页显示路径、每页文章数量、排序方式。
# ============================================================

# 首页路径。
# 空字符串表示网站根目录，也就是首页就在 /
# 如果你改成 blog，那么首页文章列表会在 /blog/
index_generator:
  path: ''

  # 首页每页显示多少篇文章。
  # 10 表示每页 10 篇。
  # 如果你以后文章很多，可以根据阅读体验调整。
  per_page: 10

  # 首页文章排序方式。
  # -date 表示按日期倒序，新的在前。
  # 这是博客最常见的设置。
  order_by: -date

# ============================================================
# Category & Tag / 分类与标签
# 用于设置文章未分类时的默认分类，以及分类/标签映射。
# ============================================================

# 默认分类。
# 当文章没有写 category/categories 时，会归到这里。
# 你可以改成更符合自己网站气质的名字，例如：
# default_category: 随记
# default_category: 未分类
# default_category: notes
default_category: uncategorized

# 分类映射。
# 一般用于把旧分类名映射成新分类名。
# 例如：
# category_map:
#   'photo': '摄影'
#   'essay': '随笔'
# 目前留空即可。
category_map:

# 标签映射。
# 和 category_map 类似，用于统一标签名称。
# 例如：
# tag_map:
#   'music': '音乐'
#   'memory': '回忆'
tag_map:

# ============================================================
# Metadata / 元信息
# 主要影响页面头部 meta 标签。
# ============================================================

# 是否在页面中生成 Hexo 的 meta generator 标签。
# true：会输出生成器信息
# false：不输出
# 对普通个人网站影响不大，保留默认即可。
meta_generator: true

# ============================================================
# Date / Time format / 日期时间格式
# 控制日期与时间在页面上的显示方式。
# ============================================================

# 日期显示格式。
# YYYY-MM-DD 会显示成 2026-04-01 这种形式。
# 你也可以改成：
# date_format: YYYY年MM月DD日
# 让中文站点更自然。
date_format: YYYY-MM-DD

# 时间显示格式。
# HH:mm:ss 会显示成 14:30:59 这种 24 小时制格式。
# 如果你的网站很少展示具体秒数，也可以以后改短一些。
time_format: HH:mm:ss

# updated_option 用来控制“文章更新时间”从哪里取值。
# 可选值：
# - mtime：取文件最后修改时间
# - date：取文章 front-matter 中的 date
# - empty：不设置更新时间
# 如果你经常回头修文章，mtime 很方便。
updated_option: 'mtime'

# ============================================================
# Pagination / 分页
# 控制列表页的全局分页行为。
# ============================================================

# 每页显示数量。
# 0 表示关闭分页。
# 这里和首页 index_generator.per_page 有关联，但适用范围更广。
per_page: 10

# 分页目录名。
# 例如第 2 页可能会是 /page/2/
pagination_dir: page

# ============================================================
# Include / Exclude / Ignore
# 这些规则只对 source/ 目录内的文件生效。
# 用来决定哪些文件要被处理、排除或忽略。
# ============================================================

# 强制包含的文件。
# 通常很少手动设置。
# 适合在某些默认不会处理的场景下强行纳入。
include:

# 排除的文件。
# 写在这里的 source/ 下文件不会被 Hexo 处理。
# 例如你不想让某些草稿素材进入生成流程时可以用。
exclude:

# 忽略的文件。
# 与 exclude 类似，但更偏底层忽略规则。
# 一般保持空即可。
ignore:

# ============================================================
# Extensions / 扩展与主题
# 这里主要决定你的网站使用哪个主题。
# ============================================================

# 当前启用的主题名称。
# 你现在使用的是 butterfly 主题。
# 如果以后安装了别的主题，可以把这里改成对应目录名。
# 注意：改主题后，很多视觉设置要去主题配置文件里继续调。
theme: butterfly

# ============================================================
# Deployment / 部署
# 控制 hexo deploy 的部署方式。
# 如果你还没正式部署，先留空也没关系。
# ============================================================

deploy:
  # 部署类型。
  # 常见值取决于你安装的部署插件，例如：
  # type: git
  # type: rsync
  # type: s3
  # 如果这里是空字符串，说明当前还没有配置一键部署。
  type: ''
